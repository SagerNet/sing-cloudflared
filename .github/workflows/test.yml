name: test

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: unit (${{ matrix.os }}, go${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go-version:
          - '1.26'
          - '1.25'
          - '1.24'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run unit tests
        run: go test ./...
