name: test

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.8"
  LIVE_TEST_PATTERN: '^TestLive'

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test ./...

  live:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: sing-cloudflared-live-testbox
      cancel-in-progress: false
    env:
      CF_LIVE_TESTS: "1"
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
      CF_TEST_HOSTNAME: ${{ secrets.CF_TEST_HOSTNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Validate live test configuration
        run: |
          set -euo pipefail
          for name in CF_API_TOKEN CF_ACCOUNT_ID CF_ZONE_ID CF_ZONE_NAME CF_TEST_HOSTNAME; do
            if [ -z "${!name:-}" ]; then
              echo "missing required Actions configuration: $name" >&2
              exit 1
            fi
          done

      - name: Run live integration tests
        run: go test -v ./... -run "$LIVE_TEST_PATTERN" -count=1 -timeout 15m
